name: "[Infra] Sync Codex Prompt"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ${{ github.event.head_commit && (startsWith(github.event.head_commit.message, '[claude]') && '(Claude)' || startsWith(github.event.head_commit.message, '[codex]') && '(Codex)' || '') || '' }} ref=${{ github.ref_name }}"

# Auto-regenerates AGENTS.md whenever
# workflows, schemas, contracts, or triggers change.
# Keeps Codex always up-to-date with the latest project state.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - 'schemas/*.json'
      - 'contracts/*.json'
      - 'trigger/*.json'
      - 'CLAUDE.md'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-codex
  cancel-in-progress: true

env:
  AUTOPILOT_REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  STAGE 1 → Collect + Generate + Commit
  # ═══════════════════════════════════════════════════════════════
  sync:
    name: "1. Collect → Generate → Commit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: "Collect metadata"
        id: collect
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          # ── Workflows table ──
          echo "=== Scanning workflows ==="
          WF_TABLE=""
          DISPATCH_TABLE=""
          for F in .github/workflows/*.yml; do
            BN=$(basename "$F")
            [ "$BN" = "sync-codex-prompt.yml" ] && continue
            WF_NAME=$(python3 -c "
          import yaml
          with open('$F') as f:
              d = yaml.safe_load(f)
              print(d.get('name', '${BN}'))
          " 2>/dev/null || echo "$BN")
            TRIGGERS=$(python3 -c "
          import yaml
          with open('$F') as f:
              d = yaml.safe_load(f)
              on = d.get('on', d.get(True, {}))
              if isinstance(on, str): print(on); exit()
              if isinstance(on, list): print(', '.join(on)); exit()
              if isinstance(on, dict):
                  p = []
                  if 'schedule' in on: p.append('scheduled')
                  if 'push' in on:
                      push = on['push']
                      if isinstance(push, dict) and 'paths' in push:
                          tp = [x for x in push['paths'] if 'trigger/' in x]
                          p.append('trigger file' if tp else 'push')
                      else: p.append('push')
                  if 'workflow_dispatch' in on: p.append('manual')
                  if 'workflow_call' in on: p.append('reusable')
                  if 'pull_request' in on: p.append('PR')
                  if 'delete' in on: p.append('on delete')
                  print(', '.join(p) if p else 'unknown')
          " 2>/dev/null || echo "unknown")
            WF_TABLE="${WF_TABLE}| ${BN} | ${WF_NAME} | ${TRIGGERS} |\n"

            # Dispatch inputs
            INPUTS=$(python3 -c "
          import yaml
          with open('$F') as f:
              d = yaml.safe_load(f)
              on = d.get('on', d.get(True, {}))
              if isinstance(on, dict) and 'workflow_dispatch' in on:
                  wd = on['workflow_dispatch']
                  if wd and isinstance(wd, dict) and 'inputs' in wd:
                      print(', '.join(wd['inputs'].keys()))
          " 2>/dev/null || echo "")
            [ -n "$INPUTS" ] && DISPATCH_TABLE="${DISPATCH_TABLE}| ${BN} | ${INPUTS} |\n"
          done

          # ── Trigger files ──
          echo "=== Scanning triggers ==="
          TRIG_TABLE=""
          for F in trigger/*.json; do
            BN=$(basename "$F")
            MATCHING=$(grep -rl "trigger/${BN}" .github/workflows/ 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "—")
            FIELDS=$(jq -r 'keys | map(select(. != "schemaVersion" and . != "run" and . != "_context")) | join(", ")' "$F" 2>/dev/null || echo "—")
            CONTEXT=$(jq -r '._context // "—"' "$F" 2>/dev/null || echo "—")
            TRIG_TABLE="${TRIG_TABLE}| \`trigger/${BN}\` | ${MATCHING} | ${CONTEXT} | ${FIELDS} |\n"
          done

          # ── Schemas ──
          echo "=== Scanning schemas ==="
          SCHEMA_TABLE=""
          for F in schemas/*.json; do
            BN=$(basename "$F")
            TITLE=$(jq -r '.title // .description // "—"' "$F" 2>/dev/null | head -c 60 || echo "—")
            SCHEMA_TABLE="${SCHEMA_TABLE}| ${BN} | ${TITLE} |\n"
          done

          # ── Agents ──
          echo "=== Scanning contracts ==="
          AGENT_TABLE=""
          for F in contracts/*-agent-contract.json; do
            AGENT=$(jq -r '.agent // "?"' "$F" 2>/dev/null)
            AID=$(jq -r '.agentIdentifier // "?"' "$F" 2>/dev/null)
            CAPS=$(jq -r '.capabilities | join(", ")' "$F" 2>/dev/null | head -c 80 || echo "—")
            AGENT_TABLE="${AGENT_TABLE}| ${AGENT} | ${AID} | ${CAPS} |\n"
          done

          # ── Available workspaces ──
          echo "=== Checking workspaces ==="
          WS_TABLE=""
          WS_LIST=$(gh api "repos/$AUTOPILOT_REPO/contents/state/workspaces?ref=$STATE_BRANCH" --jq '.[].name' 2>/dev/null || echo "ws-default")
          for WS_ID in $WS_LIST; do
            WS_COMPANY=$(gh api "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/workspace.json?ref=$STATE_BRANCH" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.company.name // .displayName // "—"' 2>/dev/null || echo "—")
            WS_STATUS=$(gh api "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/workspace.json?ref=$STATE_BRANCH" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            WS_TABLE="${WS_TABLE}| ${WS_ID} | ${WS_COMPANY} | ${WS_STATUS} |\n"
          done

          # ── State files (per workspace) ──
          echo "=== Checking state ==="
          STATE_INFO=""
          for WS_ID in $WS_LIST; do
            STATE_INFO="${STATE_INFO}#### ${WS_ID}\n"
            for SF in workspace.json health.json agent-release-state.json controller-release-state.json release-freeze.json; do
              EXISTS=$(gh api "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/${SF}?ref=$STATE_BRANCH" --jq '.name' 2>/dev/null || echo "")
              [ -n "$EXISTS" ] && STATE_INFO="${STATE_INFO}  ${SF}\n" || STATE_INFO="${STATE_INFO}  ${SF} (MISSING)\n"
            done
            for SUBDIR in locks audit improvements metrics handoffs approvals; do
              COUNT=$(gh api "repos/$AUTOPILOT_REPO/contents/state/workspaces/${WS_ID}/${SUBDIR}?ref=$STATE_BRANCH" --jq 'length' 2>/dev/null || echo "0")
              STATE_INFO="${STATE_INFO}  ${SUBDIR}/ (${COUNT} files)\n"
            done
            STATE_INFO="${STATE_INFO}\n"
          done

          # Save to env files for next step
          {
            echo "WF_TABLE<<EOF1"; echo -e "$WF_TABLE"; echo "EOF1"
            echo "DISPATCH_TABLE<<EOF2"; echo -e "$DISPATCH_TABLE"; echo "EOF2"
            echo "TRIG_TABLE<<EOF3"; echo -e "$TRIG_TABLE"; echo "EOF3"
            echo "SCHEMA_TABLE<<EOF4"; echo -e "$SCHEMA_TABLE"; echo "EOF4"
            echo "AGENT_TABLE<<EOF5"; echo -e "$AGENT_TABLE"; echo "EOF5"
            echo "STATE_INFO<<EOF6"; echo -e "$STATE_INFO"; echo "EOF6"
            echo "WS_TABLE<<EOF7"; echo -e "$WS_TABLE"; echo "EOF7"
          } >> "$GITHUB_ENV"

      - name: "Generate prompt"
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > AGENTS.md << 'STATIC_EOF'
          # Autopilot — Codex Agent Prompt

          > **Auto-generated** by `sync-codex-prompt.yml`. Do NOT edit manually.

          You are **Codex** operating inside the **Autopilot** control plane (`lucassfreiree/autopilot`).
          Autopilot is a web-only CI/CD orchestration system that manages releases for corporate repos using GitHub Actions.

          ## YOUR IDENTITY
          - **Agent ID**: `codex`
          - **Role**: Code implementation, refactoring, bulk changes, test execution, CI monitoring
          - **You CAN**: Implement code, run tests, create patches, trigger workflows, consume handoffs, read/write state
          - **You CANNOT**: Push directly to corporate repos (use workflows instead)

          ---

          ## WORKSPACE IDENTIFICATION (CRITICAL — DO THIS FIRST)

          This control plane manages **multiple companies**. Each company is an **isolated context**.
          **BEFORE any operation**, identify which workspace you're working with:

          1. Check trigger file `_context` field for visual identification
          2. Check `workspace_id` in trigger files or user context
          3. If user mentions Getronics, controller, agent, NestJS, bbvinet → `ws-default`
          4. If user mentions CIT, DevOps, Terraform, K8s, cloud, monitoring → `ws-cit`
          5. **If ambiguous: ASK the user — NEVER assume a default**

          Read your workspace contract: `contracts/codex-agent-contract.json`
          Read shared rules: `contracts/shared-agent-contract.json`

          STATIC_EOF

          # Fix indentation from heredoc
          sed -i 's/^          //' AGENTS.md

          echo "" >> AGENTS.md
          echo "### Available Workspaces" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "| Workspace ID | Company | Status |" >> AGENTS.md
          echo "|---|---|---|" >> AGENTS.md
          echo -e "$WS_TABLE" >> AGENTS.md

          cat >> AGENTS.md << 'ARCH_SECTION'

          ---

          ## ARCHITECTURE

          ```
          lucassfreiree/autopilot (this repo)
          ├── main branch          → Workflows, schemas, contracts, panel, triggers
          ├── autopilot-state      → Runtime state (source of truth)
          ├── autopilot-backups    → Snapshots for rollback
          └── panel/               → GitHub Pages UI
          ```

          ### State files (per workspace):
          ```
          ARCH_SECTION

          sed -i 's/^          //' AGENTS.md

          echo -e "$STATE_INFO" >> AGENTS.md
          echo '```' >> AGENTS.md

          cat >> AGENTS.md << 'TRIGGER_SECTION'

          ---

          ## HOW TO TRIGGER WORKFLOWS

          ### Method 1: Trigger Files (PREFERRED)
          Edit a trigger file on `main` branch, bump the `run` field.
          **Always check the `_context` field** to confirm you're targeting the correct workspace.

          | Trigger File | Workflow | Context | Config Fields |
          |---|---|---|---|
          TRIGGER_SECTION

          sed -i 's/^          //' AGENTS.md

          echo -e "$TRIG_TABLE" >> AGENTS.md

          cat >> AGENTS.md << 'EXAMPLE_SECTION'

          **Example — trigger a source code change:**
          ```json
          {
            "schemaVersion": 1,
            "_context": "GETRONICS | ws-default | BBVINET_TOKEN",
            "workspace_id": "ws-default",
            "component": "agent",
            "change_type": "add-file",
            "target_path": "src/utils/myNewFile.js",
            "file_content": "module.exports = { hello: () => 'world' };",
            "commit_message": "feat: add myNewFile utility",
            "promote": true,
            "run": 2
          }
          ```

          ### Method 2: workflow_dispatch API
          ```bash
          # ALWAYS specify workspace_id — never omit it
          gh api repos/lucassfreiree/autopilot/actions/workflows/{WORKFLOW}/dispatches \
            --method POST -f ref=main -f "inputs[workspace_id]=<WORKSPACE_ID>"
          ```

          ### Method 3: Create handoff
          ```bash
          gh api repos/lucassfreiree/autopilot/actions/workflows/enqueue-agent-handoff.yml/dispatches \
            --method POST -f ref=main \
            -f "inputs[from_agent]=codex" -f "inputs[to_agent]=claude" \
            -f "inputs[component]=agent" -f "inputs[summary]=Your request" \
            -f "inputs[workspace_id]=<WORKSPACE_ID>" -f "inputs[priority]=high"
          ```

          ---

          ## HOW TO READ STATE

          ```bash
          # List available workspaces
          gh api "repos/lucassfreiree/autopilot/contents/state/workspaces?ref=autopilot-state" --jq '.[].name'

          # Workspace config (replace <WS_ID> with identified workspace)
          gh api "repos/lucassfreiree/autopilot/contents/state/workspaces/<WS_ID>/workspace.json?ref=autopilot-state" --jq '.content' | base64 -d

          # Session lock (CHECK BEFORE ACTING!)
          gh api "repos/lucassfreiree/autopilot/contents/state/workspaces/<WS_ID>/locks/session-lock.json?ref=autopilot-state" --jq '.content' | base64 -d

          # Release state / Health / Improvement report
          gh api "repos/lucassfreiree/autopilot/contents/state/workspaces/<WS_ID>/{FILE}?ref=autopilot-state" --jq '.content' | base64 -d
          ```

          ---

          ## SESSION GUARD (CRITICAL)

          **Before ANY state-changing operation:**
          1. Read `locks/session-lock.json` for the target workspace
          2. If `agentId != "none"` AND `expiresAt > now` → **STOP**
          3. Create a **handoff** instead of forcing

          ---
          EXAMPLE_SECTION

          sed -i 's/^          //' AGENTS.md

          echo "## REGISTERED AGENTS" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "| Agent | ID | Capabilities |" >> AGENTS.md
          echo "|---|---|---|" >> AGENTS.md
          echo -e "$AGENT_TABLE" >> AGENTS.md

          echo "" >> AGENTS.md
          echo "---" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "## ALL WORKFLOWS" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "| File | Name | Triggers |" >> AGENTS.md
          echo "|---|---|---|" >> AGENTS.md
          echo -e "$WF_TABLE" >> AGENTS.md

          echo "" >> AGENTS.md
          echo "### Dispatch Inputs" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "| Workflow | Inputs |" >> AGENTS.md
          echo "|---|---|" >> AGENTS.md
          echo -e "$DISPATCH_TABLE" >> AGENTS.md

          echo "" >> AGENTS.md
          echo "---" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "## SCHEMAS" >> AGENTS.md
          echo "" >> AGENTS.md
          echo "| Schema | Description |" >> AGENTS.md
          echo "|---|---|" >> AGENTS.md
          echo -e "$SCHEMA_TABLE" >> AGENTS.md

          cat >> AGENTS.md << 'RULES_SECTION'

          ---

          ## RULES (non-negotiable)

          1. **NEVER** store corporate code, secrets, or internal URLs in this repo
          2. **NEVER** push directly to corporate repos — always use workflows
          3. **ALWAYS** check session lock before state-changing operations
          4. **ALWAYS** use `workspace_id` — never hardcode tenant/org names
          5. **ALWAYS** identify workspace from context BEFORE any operation — never assume a default
          6. State on `autopilot-state` is the **source of truth**
          7. If you can't do something, create a **handoff** to Claude

          ## COMMON TASKS

          | Task | How |
          |---|---|
          | Deploy code change | Edit `trigger/source-change.json`, bump `run` |
          | Run full test | Edit `trigger/full-test.json`, bump `run` |
          | Fix CI errors | Edit `trigger/fix-ci.json`, bump `run` |
          | Improvement scan | Edit `trigger/improvement.json`, bump `run` |
          | Freeze releases | Dispatch `release-freeze.yml` with `action=freeze` |
          | Backup state | Dispatch `backup-state.yml` |
          | Handoff to Claude | Dispatch `enqueue-agent-handoff.yml`, `to_agent=claude` |
          RULES_SECTION

          sed -i 's/^          //' AGENTS.md

          echo "" >> AGENTS.md
          echo "---" >> AGENTS.md
          echo "*Last synced: ${NOW} | Run: ${{ github.run_id }}*" >> AGENTS.md

      - name: "Commit if changed"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Remove old copilot file if exists
          if [ -f ".github/copilot-instructions.md" ]; then
            git rm .github/copilot-instructions.md
          fi

          git add AGENTS.md
          if git diff --cached --quiet; then
            echo "No changes to codex prompt"
          else
            LINES=$(wc -l < AGENTS.md)
            git commit -m "docs: auto-sync codex prompt ($LINES lines) [skip ci]"
            # Retry with rebase to handle race conditions (other workflows pushing to main concurrently)
            for i in 1 2 3 4; do
              if git push origin main; then
                echo "Pushed updated codex prompt ($LINES lines)"
                break
              else
                echo "::warning ::Push attempt $i failed, rebasing and retrying..."
                git pull --rebase origin main
                sleep $((i * 2))
              fi
            done
          fi

      - name: "Summary"
        if: always()
        run: |
          LINES=$(wc -l < AGENTS.md 2>/dev/null || echo "0")
          echo "## Sync Codex Prompt" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lines: $LINES" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflows scanned: $(ls .github/workflows/*.yml | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggers: $(ls trigger/*.json | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schemas: $(ls schemas/*.json | wc -l)" >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  #  STAGE 2 → Audit
  # ═══════════════════════════════════════════════════════════════
  audit:
    name: "2. Audit"
    needs: sync
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "Record"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SN=$(echo "$NOW" | tr ':' '-')
          AUDIT=$(jq -n --arg ts "$NOW" --arg run "${{ github.run_id }}" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg result "${{ needs.sync.result }}" \
            '{operation:"sync-codex-prompt",timestamp:$ts,runId:$run,runUrl:$url,syncResult:$result}')
          gh api "repos/lucassfreiree/autopilot/contents/state/workspaces/ws-default/audit/codex-sync-${SN}.json" \
            --method PUT -f "branch=autopilot-state" \
            -f "message=audit: codex-sync $SN [skip ci]" \
            -f "content=$(echo "$AUDIT"|base64 -w0)" 2>/dev/null || true
