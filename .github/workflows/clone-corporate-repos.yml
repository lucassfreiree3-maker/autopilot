name: "[Infra] Clone Corporate Repos"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ref=${{ github.ref_name }}"

# Clones corporate repos into the autopilot repo under corporate-repos/ directory.
# Uses BBVINET_TOKEN to access bbvinet/* repos.
# Triggered manually or via trigger file.

on:
  push:
    branches: [main]
    paths: ['trigger/clone-repos.json']
  workflow_dispatch:
    inputs:
      repos:
        description: "Repos to clone (comma-separated, or 'all')"
        required: true
        default: "all"

permissions:
  contents: write

env:
  AUTOPILOT_REPO: lucassfreiree/autopilot

jobs:
  clone:
    name: "Clone Corporate Repos"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: "Clone repos"
        env:
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] && [ -f trigger/clone-repos.json ]; then
            REPOS_INPUT=$(jq -r '.repos // "all"' trigger/clone-repos.json)
          else
            REPOS_INPUT="${{ github.event.inputs.repos }}"
          fi

          # Define all corporate repos
          ALL_REPOS=(
            "bbvinet/psc-sre-automacao-controller"
            "bbvinet/psc-sre-automacao-agent"
            "bbvinet/psc_releases_cap_sre-aut-controller"
            "bbvinet/psc_releases_cap_sre-aut-agent"
          )

          if [ "$REPOS_INPUT" = "all" ]; then
            REPOS=("${ALL_REPOS[@]}")
          else
            IFS=',' read -ra REPOS <<< "$REPOS_INPUT"
          fi

          # Create directory
          mkdir -p corporate-repos

          for REPO in "${REPOS[@]}"; do
            REPO=$(echo "$REPO" | xargs)  # trim whitespace
            REPO_NAME=$(echo "$REPO" | cut -d'/' -f2)
            TARGET="corporate-repos/$REPO_NAME"

            echo "=== Cloning $REPO → $TARGET ==="

            if [ -d "$TARGET" ]; then
              echo "Updating existing clone..."
              cd "$TARGET"
              git pull origin main 2>/dev/null || git pull 2>/dev/null || echo "::warning ::Pull failed for $REPO"
              cd -
            else
              git clone "https://x-access-token:${BBVINET_TOKEN}@github.com/${REPO}.git" "$TARGET" 2>/dev/null
              if [ $? -eq 0 ]; then
                echo "Cloned: $REPO ($(cd "$TARGET" && git rev-parse --short HEAD))"
              else
                echo "::error ::Failed to clone $REPO"
              fi
            fi

            # Remove .git to avoid submodule issues
            rm -rf "$TARGET/.git"
            echo "Removed .git from $TARGET"
          done

          echo ""
          echo "=== Cloned repos ==="
          ls -la corporate-repos/

      - name: "Commit and push"
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add corporate-repos/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            SUMMARY=$(ls corporate-repos/ | tr '\n' ', ')
            git commit -m "chore: clone corporate repos ($SUMMARY) [skip ci]"
            # Retry with rebase for race conditions
            for i in 1 2 3 4; do
              if git push origin main; then
                echo "Pushed corporate repos clone"
                break
              else
                echo "::warning ::Push attempt $i failed, rebasing..."
                git pull --rebase origin main
                sleep $((i * 2))
              fi
            done
          fi

      - name: "Summary"
        if: always()
        run: |
          echo "## Clone Corporate Repos" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repo | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for DIR in corporate-repos/*/; do
            NAME=$(basename "$DIR")
            FILES=$(find "$DIR" -type f | wc -l)
            echo "| $NAME | $FILES files |" >> "$GITHUB_STEP_SUMMARY"
          done
