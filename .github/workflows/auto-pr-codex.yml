name: "[Agent] Auto PR + Auto-Merge (Codex)"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ws=${{ github.event.inputs.workspace_id || 'n/a' }} • ref=${{ github.ref_name }}"

on:
  push:
    branches-ignore:
      - main
      - autopilot-state
      - autopilot-backups

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-codex-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  auto-pr:
    name: "Create/Update PR and enable auto-merge"
    runs-on: ubuntu-latest
    steps:
      - name: Create or update PR (best effort)
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            // Restrict automation to agent branches only
            if (!(branch === 'work' || branch.startsWith('codex/'))) {
              core.notice(`Skipping auto-PR for branch ${branch}`);
              core.setOutput('skipped', 'true');
              return;
            }

            const base = 'main';
            const head = `${owner}:${branch}`;

            const { data: pulls } = await github.rest.pulls.list({
              owner, repo, state: 'open', head, base, per_page: 1,
            });

            let pr;
            if (pulls.length > 0) {
              pr = pulls[0];
              core.notice(`Found existing PR #${pr.number}`);
            } else {
              const title = `chore: auto PR from ${branch}`;
              const body = [
                '## Auto-generated PR',
                '',
                `- Source branch: \`${branch}\``,
                '- Generated by `[Agent] Auto PR + Auto-Merge (Codex)`',
                '- Merge strategy: squash + auto-merge when checks pass'
              ].join('\n');

              try {
                const created = await github.rest.pulls.create({
                  owner, repo, title, head: branch, base, body,
                });
                pr = created.data;
                core.notice(`Created PR #${pr.number}`);
              } catch (e) {
                const msg = (e && e.message) ? e.message : String(e);
                const isBlockedByPolicy =
                  msg.includes('GitHub Actions is not permitted to create or approve pull requests') ||
                  (e && e.status === 403);
                if (isBlockedByPolicy) {
                  core.warning(
                    'PR creation blocked by repository Actions policy for GITHUB_TOKEN. ' +
                    'Set a PAT secret for this workflow or enable Actions to create PRs in repository settings.'
                  );
                  core.setOutput('skipped', 'true');
                  return;
                }
                throw e;
              }
            }

            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number, labels: ['codex', 'auto-pr'],
              });
            } catch (e) {
              core.warning(`Labeling failed: ${e.message}`);
            }

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_node_id', pr.node_id);
            core.setOutput('skipped', 'false');

      - name: Enable auto-merge (squash)
        if: steps.pr.outputs.skipped != 'true' && steps.pr.outputs.pr_node_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNodeId = `${{ steps.pr.outputs.pr_node_id }}`;
            if (!prNodeId) {
              core.setFailed('Missing PR node id');
              return;
            }

            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest { number }
                  }
                }
              `, { pullRequestId: prNodeId });
              core.notice(`Auto-merge enabled for PR #${{ steps.pr.outputs.pr_number }}`);
            } catch (e) {
              core.warning(`Could not enable auto-merge automatically: ${e.message}`);
            }
