name: "[Core] Backup: State Snapshot"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ws=${{ github.event.inputs.workspace_id || 'n/a' }} • ref=${{ github.ref_name }}"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: backup-state
  cancel-in-progress: true

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  BACKUP_BRANCH: autopilot-backups

jobs:
  backup:
    name: "Snapshot to autopilot-backups"
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          which jq || sudo apt-get update -qq && sudo apt-get install -y -qq jq
          jq --version

      - name: Verify token access
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if ! gh api "repos/${{ env.REPO }}" --jq '.name' > /dev/null 2>&1; then
            echo "::error ::RELEASE_TOKEN cannot access repo ${{ env.REPO }}"
            exit 1
          fi
          if ! gh api "repos/${{ env.REPO }}/branches/${{ env.BACKUP_BRANCH }}" --jq '.name' > /dev/null 2>&1; then
            echo "::error ::Branch ${{ env.BACKUP_BRANCH }} not found or inaccessible"
            exit 1
          fi
          echo "Token and branch OK"

      - name: Snapshot state to backups
        shell: bash {0}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(date -u +%Y%m%d-%H%M%S)
          BACKUP_PATH="snapshots/${SAFE_NOW}"
          COUNT_FILE=$(mktemp)
          echo "0" > "$COUNT_FILE"

          echo "Creating backup at $BACKUP_PATH..."

          # Recursive copy of all state files
          copy_tree() {
            local SRC_PATH="$1"
            local DST_PREFIX="$2"
            local FILES
            FILES=$(gh api "repos/$REPO/contents/${SRC_PATH}?ref=$STATE_BRANCH" \
              --jq '.[] | "\(.name)|\(.type)|\(.path)"' 2>/dev/null || echo "")

            if [ -z "$FILES" ]; then
              echo "::warning ::No files found at $SRC_PATH"
              return 0
            fi

            echo "$FILES" | while IFS='|' read -r NAME TYPE FPATH; do
              [ -z "$NAME" ] && continue
              if [ "$TYPE" = "dir" ]; then
                copy_tree "$FPATH" "$DST_PREFIX"
              elif [ "$TYPE" = "file" ]; then
                CONTENT=$(gh api "repos/$REPO/contents/${FPATH}?ref=$STATE_BRANCH" --jq '.content' 2>/dev/null || echo "")
                if [ -n "$CONTENT" ]; then
                  DST="${DST_PREFIX}/${FPATH}"
                  if gh api "repos/$REPO/contents/${DST}" \
                    --method PUT \
                    -f "branch=$BACKUP_BRANCH" \
                    -f "message=backup: $SAFE_NOW ${FPATH} [skip ci]" \
                    -f "content=$CONTENT" > /dev/null 2>&1; then
                    echo "  OK $FPATH"
                    echo $(( $(cat "$COUNT_FILE") + 1 )) > "$COUNT_FILE"
                  else
                    echo "  WARN Failed: $FPATH"
                  fi
                fi
              fi
            done
            return 0
          }

          copy_tree "state" "$BACKUP_PATH"
          FILE_COUNT=$(cat "$COUNT_FILE" 2>/dev/null || echo "0")
          rm -f "$COUNT_FILE"

          # Write manifest
          MANIFEST=$(jq -n \
            --arg ts "$NOW" \
            --arg path "$BACKUP_PATH" \
            --arg run "${{ github.run_id }}" \
            --argjson files "$FILE_COUNT" \
            '{timestamp: $ts, path: $path, runId: $run, type: "scheduled", fileCount: $files}')

          gh api "repos/$REPO/contents/${BACKUP_PATH}/manifest.json" \
            --method PUT \
            -f "branch=$BACKUP_BRANCH" \
            -f "message=backup: manifest $SAFE_NOW [skip ci]" \
            -f "content=$(echo "$MANIFEST" | base64 -w0)" 2>/dev/null || echo "::warning ::Failed to write manifest"

          echo "## Backup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Snapshot | $BACKUP_PATH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $NOW |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files backed up | $FILE_COUNT |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-manifest-${{ github.run_number }}
          path: /tmp/report.md
          retention-days: 90
          if-no-files-found: ignore
