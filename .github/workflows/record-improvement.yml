name: "[Agent] Record Improvement"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ws=${{ github.event.inputs.workspace_id || 'n/a' }} • ref=${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      workspace_id:
        description: "Workspace ID"
        required: true
      category:
        description: "Category"
        required: true
        type: choice
        options: [bug, performance, security, process, architecture, documentation]
      description:
        description: "Description"
        required: true
      source:
        description: "Source"
        required: true
        type: choice
        options: [ci-failure, health-check, agent-observation, manual]
      recorded_by:
        description: "Recorded by"
        required: true
        type: choice
        options: [claude, chatgpt, codex, human]

permissions:
  contents: write

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Record improvement
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          INPUT_WORKSPACE_ID: ${{ github.event.inputs.workspace_id }}
          INPUT_CATEGORY: ${{ github.event.inputs.category }}
          INPUT_DESCRIPTION: ${{ github.event.inputs.description }}
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_RECORDED_BY: ${{ github.event.inputs.recorded_by }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          WS_ID="${INPUT_WORKSPACE_ID}"
          WS_PATH="state/workspaces/${WS_ID}/improvements"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(echo "$NOW" | tr ':' '-')
          IMP_ID="imp-${SAFE_NOW}-${RUN_NUMBER}"
          IMP=$(jq -n \
            --arg id "$IMP_ID" \
            --arg ws "$WS_ID" \
            --arg now "$NOW" \
            --arg cat "$INPUT_CATEGORY" \
            --arg desc "$INPUT_DESCRIPTION" \
            --arg src "$INPUT_SOURCE" \
            --arg by "$INPUT_RECORDED_BY" \
            '{
              improvementId: $id, workspaceId: $ws, createdAt: $now,
              category: $cat, description: $desc,
              source: $src, status: "open", recordedBy: $by, resolution: ""
            }')
          ENCODED=$(echo "$IMP" | base64 -w0)
          gh api "repos/$REPO/contents/${WS_PATH}/${IMP_ID}.json" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=improvement: $IMP_ID ($WS_ID) [skip ci]" \
            -f "content=$ENCODED" 2>/dev/null || echo "::warning ::Failed to record improvement $IMP_ID"
          echo "## Improvement Recorded" >> "$GITHUB_STEP_SUMMARY"
          echo "- **ID:** $IMP_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Category:** $INPUT_CATEGORY" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Description:** $INPUT_DESCRIPTION" >> "$GITHUB_STEP_SUMMARY"
