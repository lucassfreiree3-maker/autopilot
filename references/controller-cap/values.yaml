# ============================================================
# Controller CAP Values - GitLab (not yet migrated to GitHub)
# Source: GitLab CAP repo (psc_releases_cap_sre-aut-controller)
# Path: releases/openshift/hml/deploy/values.yaml
# Image: docker.binarios.intranet.bb.com.br/bb/psc/psc-sre-automacao-controller
# Current tag: 3.5.5
# Secret: psc-sre-automacao-controller-runtime
# ============================================================
global:
  clusterSolucao: ''
  clusterServico: ''
  clusterDimensao: ''
  clusterName: ''
  clusterIndex: ''
  clusterTemplateID:
  clusterSite: ''
  servicoSigla: ''
  servicoEnv: ''
  servicoNome: ''
sre-aut-controller:
  enabled: true
  items:
    - enabled: true
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: sre-aut-controller-sa
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
    - enabled: true
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: sre-aut-controller
      rules:
        - apiGroups: [""]
          resources: ["services", "persistentvolumeclaims", "configmaps","events"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps"]
          resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["batch"]
          resources: ["jobs", "cronjobs"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["networking.k8s.io"]
          resources: ["ingresses", "networkpolicies"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["certificado.psc.bb.com.br/v1"]
          resources: ["bbcerts"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["psc.bb.com.br/v1"]
          resources: ["dnsingresses"]
          verbs: ["get", "list", "watch"]
    - enabled: true
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: sre-aut-controller-binding
      subjects:
        - kind: ServiceAccount
          name: sre-aut-controller-sa
          namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
      roleRef:
        kind: ClusterRole
        name: sre-aut-controller
        apiGroup: rbac.authorization.k8s.io
    - enabled: true
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        labels:
          app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
          release.k8s.bb.ambiente: "{{ .Values.global.servicoEnv }}"
          chart.release.k8s.bb/name: psc-sre-aut-controller
          release.k8s.bb/deploy: regular
      spec:
        revisionHistoryLimit: 7
        replicas: 1
        strategy:
          type: RollingUpdate
        selector:
          matchLabels:
            app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
            release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
            release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
            release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
            release.k8s.bb/deploy: regular
        template:
          metadata:
            labels:
              app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
              release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
              release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
              release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
              release.k8s.bb.ambiente: "{{ .Values.global.servicoEnv }}"
              release.k8s.bb/deploy: regular
          spec:
            serviceAccountName: sre-aut-controller-sa
            imagePullSecrets:
              - name: atfregistry
            nodeSelector:
              papel.node.k8s.bb/worker: "true"
            tolerations:
            - effect: "NoSchedule"
              key: "papel.node.k8s.bb/worker"
              operator: Equal
              value: "true"
            containers:
            - name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
              image: docker.binarios.intranet.bb.com.br/bb/psc/psc-sre-automacao-controller:3.5.5
              imagePullPolicy: "IfNotPresent"
              livenessProbe:
                failureThreshold: 6
                httpGet:
                  path: /health
                  port: 3000
                initialDelaySeconds: 120
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 10
              readinessProbe:
                failureThreshold: 6
                httpGet:
                  path: /ready
                  port: 3000
                initialDelaySeconds: 120
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 10
              resources:
                requests:
                  cpu: 100m
                  memory: 250Mi
                limits:
                  cpu: 150m
                  memory: 375Mi
              env:
                # ── Application ──
                - name: TZ
                  value: America/Sao_Paulo
                - name: PORT
                  value: "3000"
                - name: SERVICE_NAME
                  value: psc-sre-automacao-controller
                - name: ACCESS_STDOUT
                  value: "1"
                - name: LOGS_DIR
                  value: ./logs
                - name: LOG_RETENTION_DAYS
                  value: "15"
                - name: DB_PATH
                  value: ./data/psc_agents.db
                - name: SYNC_TIMEOUT_MS
                  value: "60000"
                # ── JWT ──
                - name: JWT_EXPIRES_IN
                  value: 5m
                - name: JWT_SIGN_ALG
                  value: HS256
                - name: JWT_ALGORITHMS
                  value: HS256
                - name: JWT_ISSUER
                  value: psc-sre-automacao-controller
                - name: JWT_AUDIENCE
                  value: psc-sre-automacao-agent
                - name: JWT_CALLBACK_ISSUER
                  value: psc-sre-automacao-agent
                - name: JWT_CALLBACK_AUDIENCE
                  value: psc-sre-automacao-controller
                - name: JWT_CALLBACK_MAX_TTL_SECONDS
                  value: "300"
                - name: JWT_DEFAULT_SUBJECT
                  value: helmfire-ritmo-client
                # ── Agent routing ──
                - name: AGENT_BASE_URL_TEMPLATE
                  value: https://sre-aut-agent.psc.{cluster}.bb.com.br
                # ── OAS Origin Auth (added in 3.5.x — from K8s Secret: sre-controller-auth) ──
                - name: OAS_TRUSTED_NAMESPACE
                  valueFrom:
                    secretKeyRef:
                      name: sre-controller-auth
                      key: OAS_TRUSTED_NAMESPACE
                - name: OAS_TRUSTED_SERVICE_ACCOUNT
                  valueFrom:
                    secretKeyRef:
                      name: sre-controller-auth
                      key: OAS_TRUSTED_SERVICE_ACCOUNT
                - name: OAS_ORIGIN_NAMESPACE_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: sre-controller-auth
                      key: OAS_ORIGIN_NAMESPACE_HEADERS
                - name: OAS_ORIGIN_SERVICE_ACCOUNT_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: sre-controller-auth
                      key: OAS_ORIGIN_SERVICE_ACCOUNT_HEADERS
                # ── OAS Preflight ──
                - name: OAS_PREFLIGHT_IMAGE_KEY
                  value: psc-sre-ns-migration-preflight
                - name: OAS_PREFLIGHT_FUNCTION_ORIGEM
                  value: migration_origem
                - name: OAS_PREFLIGHT_FUNCTION_DESTINO
                  value: migration_destino
                # ── Object Storage (traces/logs) ──
                - name: OSS_TRACE_PREFIX
                  value: controller/automation-trace
                - name: OSS_REQUESTS_PREFIX
                  value: controller/requests
                - name: TRACE_DEBUG
                  value: "0"
                # ── Secrets (from K8s Secret: psc-sre-automacao-controller-runtime) ──
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: JWT_SECRET
                - name: AUTH_API_KEYS_SCOPES
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: AUTH_API_KEYS_SCOPES
                - name: SCOPE_EXECUTE_AUTOMATION
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: SCOPE_EXECUTE_AUTOMATION
                - name: SCOPE_SEND_LOGS
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: SCOPE_SEND_LOGS
                - name: SCOPE_READ_STATUS
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: SCOPE_READ_STATUS
                - name: SCOPE_REGISTER_AGENT
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: SCOPE_REGISTER_AGENT
                - name: AWS_REGION
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: AWS_REGION
                - name: OSS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: OSS_ACCESS_KEY_ID
                - name: OSS_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: OSS_BUCKET
                - name: OSS_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: OSS_ENDPOINT
                - name: OSS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: psc-sre-automacao-controller-runtime
                      key: OSS_SECRET_ACCESS_KEY
    - enabled: true
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        labels:
          app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/project: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
          release.k8s.bb.appName: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb.ambiente: "{{ .Values.global.servicoEnv }}"
          chart.release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          projeto: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          sigla: "{{ .Values.global.servicoSigla }}"
      spec:
        type: ClusterIP
        selector:
          app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        ports:
          - name: http
            port: 80
            targetPort: 3000
    - enabled: true
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        labels:
          app: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/project: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
          release.k8s.bb.appName: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb.ambiente: "{{ .Values.global.servicoEnv }}"
          chart.release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/ingress: interno
          ingress.k8s.bb/class: nginx
          chart.k8s.bb/modificado: "versao-ingress"
        annotations:
          haproxy.org/timeout-client: 1800s
          haproxy.org/timeout-connect: 30s
          haproxy.org/timeout-server: 1800s
          kubernetes.io/ingress.class: nginx
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
      spec:
        rules:
        - host: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
          http:
            paths:
            - path: "/"
              pathType: Prefix
              backend:
                service:
                  name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
                  port:
                    number: 80
        tls:
        - hosts:
          - "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
          secretName: "{{ .Values.global.servicoNome }}"
    - enabled: true
      apiVersion: psc.bb.com.br/v1
      kind: DnsIngress
      metadata:
        name: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
        labels:
          app: dnsingress
          release: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/name: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/project: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
          release.k8s.bb/sigla: "{{ .Values.global.servicoSigla }}"
          chart.release.k8s.bb/name: dnsingress
          chart.release.k8s.bb/version: 2.0.0
      spec:
        ingressClass: nginx
        hostname: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
    - enabled: true
      apiVersion: certificado.psc.bb.com.br/v1
      kind: BBCert
      metadata:
        name: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
        namespace: "{{ .Values.global.servicoSigla }}-{{ .Values.global.servicoNome }}"
      spec:
        autoRenew:
          enabled: true
          qtDaysBeforeCertExpirion: 30
        custodianteCertificado:
          matriculaBB: F6321212
        dadosCertificado:
          alternativesNames:
          - "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
          ambientePKI: "{{ .Values.global.servicoEnv }}"
          commomName: "{{ .Values.global.servicoNome }}.psc.{{ .Values.global.clusterName }}.bb.com.br"
          secretNameToExport: "{{ .Values.global.servicoNome }}"
          sigla: "{{ .Values.global.servicoSigla }}"
          ttl: 365
