---
# Lock garbage collection — every 15 minutes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: autopilot-lock-gc
  namespace: autopilot-ws-default
  labels:
    app: autopilot
    task: lock-gc
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          containers:
            - name: dispatch
              image: ghcr.io/cli/cli:latest
              command: ["gh"]
              args:
                - "api"
                - "repos/lucassfreiree/autopilot/actions/workflows/workspace-lock-gc.yml/dispatches"
                - "--method"
                - "POST"
                - "-f"
                - "ref=main"
                - "-f"
                - "inputs[workspace_id]=ws-default"
              env:
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: autopilot-secrets
                      key: GITHUB_PAT
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
          restartPolicy: Never
