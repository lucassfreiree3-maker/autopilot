name: "Test: Corporate E2E Flow"

on:
  push:
    branches: [main]
    paths: ['trigger/e2e-test.json']
  workflow_dispatch:
    inputs:
      workspace_id:
        description: "Workspace ID"
        required: true
        default: "ws-default"
      dry_run:
        description: "Dry run (no push, no promote)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: test-corporate-flow
  cancel-in-progress: false

env:
  AUTOPILOT_REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state

jobs:
  e2e:
    name: "clone → bump → push main → CI → promote CAP"
    runs-on: ubuntu-latest
    steps:

      - name: Checkout autopilot
        uses: actions/checkout@v4

      - name: "0 - Resolve inputs"
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -f trigger/e2e-test.json ]; then
            WS_ID=$(jq -r '.workspace_id // "ws-default"' trigger/e2e-test.json)
            DRY_RUN=$(jq -r '.dry_run // "false"' trigger/e2e-test.json)
          else
            WS_ID="${{ github.event.inputs.workspace_id }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          fi
          [ -z "$WS_ID" ] && WS_ID="ws-default"
          [ -z "$DRY_RUN" ] && DRY_RUN="false"
          echo "workspace_id=$WS_ID" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "Workspace=$WS_ID DryRun=$DRY_RUN"

      - name: "1 - Read workspace config"
        id: ws
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.inputs.outputs.workspace_id }}"
          WS_PATH="state/workspaces/${WS_ID}"
          WS_JSON=$(gh api "repos/$AUTOPILOT_REPO/contents/${WS_PATH}/workspace.json?ref=$STATE_BRANCH" \
            --jq '.content' | base64 -d)
          echo "source_repo=$(echo "$WS_JSON" | jq -r '.agent.sourceRepo')" >> "$GITHUB_OUTPUT"
          echo "cap_repo=$(echo "$WS_JSON" | jq -r '.agent.capRepo')" >> "$GITHUB_OUTPUT"
          echo "cap_branch=$(echo "$WS_JSON" | jq -r '.agent.capBranch // "main"')" >> "$GITHUB_OUTPUT"
          echo "cap_values=$(echo "$WS_JSON" | jq -r '.agent.capValuesPath')" >> "$GITHUB_OUTPUT"
          echo "image_pattern=$(echo "$WS_JSON" | jq -r '.agent.imagePattern')" >> "$GITHUB_OUTPUT"
          echo "ws_path=$WS_PATH" >> "$GITHUB_OUTPUT"
          echo "## Config" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source: $(echo "$WS_JSON" | jq -r '.agent.sourceRepo')" >> "$GITHUB_STEP_SUMMARY"
          echo "- CAP: $(echo "$WS_JSON" | jq -r '.agent.capRepo')" >> "$GITHUB_STEP_SUMMARY"

      - name: "2 - Clone agent source"
        id: clone
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ steps.ws.outputs.source_repo }}.git" /tmp/source
          cd /tmp/source
          git config user.name "autopilot[bot]"
          git config user.email "autopilot[bot]@users.noreply.github.com"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: "3 - Bump version (patch)"
        id: bump
        working-directory: /tmp/source
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJ MIN PAT <<< "$CURRENT"
          NEW="${MAJ}.${MIN}.$((PAT+1))"
          jq --arg v "$NEW" '.version = $v' package.json > /tmp/p.json && mv /tmp/p.json package.json
          git add package.json
          git commit -m "chore: bump version $CURRENT -> $NEW [autopilot]"
          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "## Bump" >> "$GITHUB_STEP_SUMMARY"
          echo "- $CURRENT → $NEW" >> "$GITHUB_STEP_SUMMARY"

      - name: "4 - Push to main"
        if: steps.inputs.outputs.dry_run != 'true'
        id: push
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        working-directory: /tmp/source
        run: |
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "Pushed to main"

      - name: "5 - Wait for CI"
        if: steps.inputs.outputs.dry_run != 'true'
        id: ci_raw
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          SHA="${{ steps.bump.outputs.sha }}"
          REPO="${{ steps.ws.outputs.source_repo }}"
          RESULT="pending"
          DETAIL=""
          echo "Waiting for CI on $SHA..."
          FOUND=false
          for i in $(seq 1 36); do
            sleep 5
            COUNT=$(gh api "repos/$REPO/commits/$SHA/check-runs" --jq '.total_count' 2>/dev/null || echo "0")
            if [ "$COUNT" -gt 0 ]; then FOUND=true; break; fi
            echo "  Waiting for checks... ($i)"
          done
          if [ "$FOUND" = "false" ]; then
            echo "::warning ::No CI checks appeared in 3 min."
            RESULT="no-ci"
            DETAIL="no-checks-found"
          else
            for i in $(seq 1 120); do
              sleep 10
              DATA=$(gh api "repos/$REPO/commits/$SHA/check-runs" \
                --jq '{t:.total_count, c:[.check_runs[]|select(.status=="completed")]|length, s:[.check_runs[]|select(.conclusion=="success")]|length, f:[.check_runs[]|select(.conclusion=="failure")]|length}' 2>/dev/null || echo '{}')
              T=$(echo "$DATA"|jq -r '.t//0'); C=$(echo "$DATA"|jq -r '.c//0')
              S=$(echo "$DATA"|jq -r '.s//0'); F=$(echo "$DATA"|jq -r '.f//0')
              echo "  CI: $C/$T done (ok=$S fail=$F) [$i]"
              if [ "$T" -gt 0 ] && [ "$C" -eq "$T" ]; then
                if [ "$F" -gt 0 ]; then RESULT="failure"; else RESULT="success"; fi
                DETAIL="${S}/${T}"
                break
              fi
            done
            [ "$RESULT" = "pending" ] && RESULT="timeout" && DETAIL="timeout-20m"
          fi
          echo "ci_result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "ci_detail=$DETAIL" >> "$GITHUB_OUTPUT"
          echo "CI result: $RESULT ($DETAIL)"

      - name: "5b - CI Gate"
        id: gate
        run: |
          RAW="${{ steps.ci_raw.outputs.ci_result }}"
          DRY="${{ steps.inputs.outputs.dry_run }}"
          echo "Raw CI result: '$RAW'"
          echo "Dry run: '$DRY'"
          # Allow promotion if CI passed or no CI configured
          if [ "$DRY" = "true" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Gate: dry run, skip promote"
          elif [ "$RAW" = "success" ] || [ "$RAW" = "no-ci" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Gate: PROCEED with promotion (ci=$RAW)"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "Gate: SKIP promotion (ci=$RAW)"
          fi
          echo "## CI Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- ci_result=$RAW" >> "$GITHUB_STEP_SUMMARY"
          echo "- dry_run=$DRY" >> "$GITHUB_STEP_SUMMARY"
          echo "- proceed=$(cat "$GITHUB_OUTPUT" | grep proceed | cut -d= -f2)" >> "$GITHUB_STEP_SUMMARY"

      - name: "6 - Promote tag in CAP"
        if: steps.gate.outputs.proceed == 'true'
        id: promote
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          CAP_REPO="${{ steps.ws.outputs.cap_repo }}"
          CAP_BRANCH="${{ steps.ws.outputs.cap_branch }}"
          CAP_VALUES="${{ steps.ws.outputs.cap_values }}"
          IMAGE_PATTERN="${{ steps.ws.outputs.image_pattern }}"
          TAG="${{ steps.bump.outputs.new }}-${{ steps.bump.outputs.short }}"
          echo "CAP_REPO=$CAP_REPO CAP_VALUES=$CAP_VALUES TAG=$TAG"
          if [ -z "$CAP_REPO" ] || [ "$CAP_REPO" = "null" ]; then
            echo "::warning ::CAP repo not configured"
            echo "pushed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Reading $CAP_VALUES from $CAP_REPO ($CAP_BRANCH)..."
          VALUES=$(gh api "repos/$CAP_REPO/contents/${CAP_VALUES}?ref=$CAP_BRANCH" --jq '.content' | base64 -d)
          VSHA=$(gh api "repos/$CAP_REPO/contents/${CAP_VALUES}?ref=$CAP_BRANCH" --jq '.sha')
          echo "=== values.yaml content ==="
          echo "$VALUES"
          echo "=== imagePattern: $IMAGE_PATTERN ==="
          echo "=== tag: $TAG ==="
          # Try imagePattern match
          UPDATED=$(echo "$VALUES" | sed "s|\(${IMAGE_PATTERN}\).*|\1${TAG}|")
          if [ "$VALUES" != "$UPDATED" ]; then
            echo "Matched with imagePattern"
          else
            echo "imagePattern didn't match. Trying tag: field..."
            UPDATED=$(echo "$VALUES" | sed "s|^\(\s*tag:\s*\).*|\1\"${TAG}\"|")
          fi
          if [ "$VALUES" = "$UPDATED" ]; then
            echo "::error ::No pattern matched in values.yaml"
            echo "## DEBUG values.yaml" >> "$GITHUB_STEP_SUMMARY"
            echo '```yaml' >> "$GITHUB_STEP_SUMMARY"
            echo "$VALUES" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pushed=false" >> "$GITHUB_OUTPUT"; exit 1
          fi
          echo "=== UPDATED ==="
          echo "$UPDATED"
          gh api "repos/$CAP_REPO/contents/${CAP_VALUES}" --method PUT \
            -f "branch=$CAP_BRANCH" \
            -f "message=chore(release): agent -> ${TAG} [autopilot]" \
            -f "content=$(echo "$UPDATED" | base64 -w0)" \
            -f "sha=$VSHA"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "## CAP" >> "$GITHUB_STEP_SUMMARY"
          echo "- Promoted: $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: "7 - Save state"
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          FILE="${{ steps.ws.outputs.ws_path }}/agent-release-state.json"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FSHA=$(gh api "repos/$AUTOPILOT_REPO/contents/${FILE}?ref=$STATE_BRANCH" --jq '.sha' 2>/dev/null || echo "")
          TAG="${{ steps.promote.outputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ steps.bump.outputs.new }}-${{ steps.bump.outputs.short }}"
          PROMO='[]'
          [ "${{ steps.promote.outputs.pushed }}" = "true" ] && \
            PROMO=$(jq -n --arg r "${{ steps.ws.outputs.cap_repo }}" --arg b "${{ steps.ws.outputs.cap_branch }}" \
              --arg p "${{ steps.ws.outputs.cap_values }}" --arg t "$TAG" --arg s "${{ steps.bump.outputs.sha }}" --arg ts "$NOW" \
              '[{target:"cap",repo:$r,branch:$b,path:$p,tag:$t,sha:$s,timestamp:$ts,status:"success"}]')
          STATE=$(jq -n --arg ws "${{ steps.inputs.outputs.workspace_id }}" --arg sha "${{ steps.bump.outputs.sha }}" \
            --arg tag "$TAG" --arg ver "${{ steps.bump.outputs.new }}" --arg ts "$NOW" \
            --arg run "${{ github.run_id }}" --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --argjson promo "$PROMO" \
            '{schemaVersion:2,workspaceId:$ws,component:"agent",lastReleasedSha:$sha,lastTag:$tag,lastVersion:$ver,updatedAt:$ts,runId:$run,runUrl:$url,promotions:$promo,status:"promoted"}')
          ARGS=(-f "branch=$STATE_BRANCH" -f "message=state: agent -> $TAG [skip ci]" -f "content=$(echo "$STATE"|base64 -w0)")
          [ -n "$FSHA" ] && [ "$FSHA" != "null" ] && ARGS+=(-f "sha=$FSHA")
          gh api "repos/$AUTOPILOT_REPO/contents/${FILE}" --method PUT "${ARGS[@]}"

      - name: "8 - Cleanup leftover branches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          REPO="${{ steps.ws.outputs.source_repo }}"
          REFS=$(gh api "repos/$REPO/git/matching-refs/heads/autopilot/" --jq '.[].ref' 2>/dev/null || echo "")
          for R in $REFS; do
            echo "Deleting $R..."
            gh api "repos/$REPO/git/$R" --method DELETE 2>/dev/null || true
          done

      - name: "9 - Audit"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.inputs.outputs.workspace_id }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SN=$(echo "$NOW"|tr ':' '-')
          CI="${{ steps.ci_raw.outputs.ci_result }}"; [ -z "$CI" ] && CI="skipped"
          PR="${{ steps.promote.outputs.pushed }}"; [ -z "$PR" ] && PR="false"
          AUDIT=$(jq -n --arg ws "$WS_ID" --arg ts "$NOW" --arg run "${{ github.run_id }}" \
            --arg ci "$CI" --arg pr "$PR" --arg ver "${{ steps.bump.outputs.new }}" \
            --arg tag "${{ steps.promote.outputs.tag }}" --arg dry "${{ steps.inputs.outputs.dry_run }}" \
            '{operation:"e2e-release",workspaceId:$ws,timestamp:$ts,runId:$run,dryRun:($dry=="true"),ci:$ci,promoted:($pr=="true"),version:$ver,tag:$tag}')
          gh api "repos/$AUTOPILOT_REPO/contents/${{ steps.ws.outputs.ws_path }}/audit/e2e-release-${SN}.json" \
            --method PUT -f "branch=$STATE_BRANCH" -f "message=audit: e2e-release $WS_ID [skip ci]" \
            -f "content=$(echo "$AUDIT"|base64 -w0)" 2>/dev/null || true
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "## Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${{ steps.bump.outputs.old }} → ${{ steps.bump.outputs.new }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Push | ${{ steps.push.outputs.pushed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI | $CI (${{ steps.ci_raw.outputs.ci_detail }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promote | $PR |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | ${{ steps.promote.outputs.tag }} |" >> "$GITHUB_STEP_SUMMARY"
