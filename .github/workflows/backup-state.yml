name: "[Core] Backup: State Snapshot"
run-name: "${{ github.workflow }} â€˘ ${{ github.event_name }} â€˘ ws=${{ github.event.inputs.workspace_id || 'n/a' }} â€˘ ref=${{ github.ref_name }}"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  BACKUP_BRANCH: autopilot-backups

jobs:
  backup:
    name: "Snapshot to autopilot-backups"
    runs-on: ubuntu-latest
    steps:
      - name: Snapshot state to backups
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(date -u +%Y%m%d-%H%M%S)
          BACKUP_PATH="snapshots/${SAFE_NOW}"
          echo "Creating backup at $BACKUP_PATH..."
          # Recursive copy of all state files
          copy_tree() {
            local SRC_PATH="$1"
            local DST_PREFIX="$2"
            local FILES=$(gh api "repos/$REPO/contents/${SRC_PATH}?ref=$STATE_BRANCH" \
              --jq '.[] | "\(.name)|\(.type)|\(.path)"' 2>/dev/null || echo "")
            while IFS='|' read -r NAME TYPE PATH; do
              [ -z "$NAME" ] && continue
              if [ "$TYPE" = "dir" ]; then
                copy_tree "$PATH" "$DST_PREFIX"
              elif [ "$TYPE" = "file" ]; then
                CONTENT=$(gh api "repos/$REPO/contents/${PATH}?ref=$STATE_BRANCH" --jq '.content' 2>/dev/null || echo "")
                if [ -n "$CONTENT" ]; then
                  DST="${DST_PREFIX}/${PATH}"
                  gh api "repos/$REPO/contents/${DST}" \
                    --method PUT \
                    -f "branch=$BACKUP_BRANCH" \
                    -f "message=backup: $SAFE_NOW ${PATH} [skip ci]" \
                    -f "content=$CONTENT" 2>/dev/null || true
                fi
              fi
            done <<< "$FILES"
          }
          copy_tree "state" "$BACKUP_PATH"
          # Write manifest
          MANIFEST=$(jq -n \
            --arg ts "$NOW" \
            --arg path "$BACKUP_PATH" \
            --arg run "${{ github.run_id }}" \
            '{timestamp: $ts, path: $path, runId: $run, type: "scheduled"}')
          gh api "repos/$REPO/contents/${BACKUP_PATH}/manifest.json" \
            --method PUT \
            -f "branch=$BACKUP_BRANCH" \
            -f "message=backup: manifest $SAFE_NOW [skip ci]" \
            -f "content=$(echo "$MANIFEST" | base64 -w0)" 2>/dev/null || true
          echo "## Backup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Snapshot:** $BACKUP_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Timestamp:** $NOW" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-manifest-${{ github.run_number }}
          path: /tmp/report.md
          retention-days: 90
          if-no-files-found: ignore
