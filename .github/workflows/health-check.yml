name: "Health Check"

on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:
    inputs:
      workspace_id:
        description: "Workspace ID (leave empty for all)"
        required: false

permissions:
  contents: write

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  STUCK_THRESHOLD_MIN: 120

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Discover workspaces
        id: discover
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          INPUT_WS="${{ github.event.inputs.workspace_id }}"
          if [ -n "$INPUT_WS" ]; then
            echo "workspaces=$INPUT_WS" >> "$GITHUB_OUTPUT"
          else
            WS_LIST=$(gh api "repos/$REPO/contents/state/workspaces?ref=$STATE_BRANCH" \
              --jq '[.[].name] | join(" ")' 2>/dev/null || echo "")
            echo "workspaces=$WS_LIST" >> "$GITHUB_OUTPUT"
          fi

      - name: Run health checks
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WORKSPACES="${{ steps.discover.outputs.workspaces }}"
          if [ -z "$WORKSPACES" ]; then
            echo "::warning ::Nenhum workspace encontrado."
            echo '{"overall":"unknown","summary":"No workspaces found"}' > /tmp/health-summary.json
            exit 0
          fi
          OVERALL="healthy"
          {
            echo "## Health Check - $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
          } > /tmp/report.md
          for WS_ID in $WORKSPACES; do
            WS_PATH="state/workspaces/${WS_ID}"
            NOW_S=$(date +%s)
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            WS_STATUS="healthy"
            CHECKS='{}'
            # Check: workspace exists
            WS_JSON=$(gh api "repos/$REPO/contents/${WS_PATH}/workspace.json?ref=$STATE_BRANCH" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -z "$WS_JSON" ]; then
              CHECKS=$(echo "$CHECKS" | jq '.workspace = {status:"fail", message:"workspace.json not found"}')
              WS_STATUS="critical"
            elif ! echo "$WS_JSON" | jq empty 2>/dev/null; then
              CHECKS=$(echo "$CHECKS" | jq '.workspace = {status:"fail", message:"workspace.json is not valid JSON (base64 decode may have failed)"}')
              WS_STATUS="critical"
              WS_JSON=""
            elif ! echo "$WS_JSON" | jq -e '.workspaceId' >/dev/null 2>&1; then
              CHECKS=$(echo "$CHECKS" | jq '.workspace = {status:"warn", message:"workspace.json is valid JSON but missing workspaceId field"}')
              [ "$WS_STATUS" = "healthy" ] && WS_STATUS="degraded"
            else
              CHECKS=$(echo "$CHECKS" | jq '.workspace = {status:"pass", message:"OK"}')
            fi
            # Check: controller release state
            CTRL_STATE=$(gh api "repos/$REPO/contents/${WS_PATH}/controller-release-state.json?ref=$STATE_BRANCH" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')
            CTRL_SHA=$(echo "$CTRL_STATE" | jq -r '.lastReleasedSha // ""')
            CTRL_TAG=$(echo "$CTRL_STATE" | jq -r '.lastTag // ""')
            CTRL_TS=$(echo "$CTRL_STATE" | jq -r '.updatedAt // ""')
            if [ -z "$CTRL_SHA" ]; then
              CHECKS=$(echo "$CHECKS" | jq '.controllerRelease = {status:"warn", message:"Never released"}')
              [ "$WS_STATUS" = "healthy" ] && WS_STATUS="degraded"
            else
              AGE_H=-1
              if [ -n "$CTRL_TS" ] && [ "$CTRL_TS" != "null" ]; then
                LAST_S=$(date -d "$CTRL_TS" +%s 2>/dev/null || echo "$NOW_S")
                AGE_H=$(( (NOW_S - LAST_S) / 3600 ))
              fi
              CHECKS=$(echo "$CHECKS" | jq --arg tag "$CTRL_TAG" --argjson age "$AGE_H" \
                '.controllerRelease = {status:"pass", message: ("Tag: " + $tag), detail: ("Age: " + ($age | tostring) + "h")}')
            fi
            # Check: agent release state
            AGENT_STATE=$(gh api "repos/$REPO/contents/${WS_PATH}/agent-release-state.json?ref=$STATE_BRANCH" \
              --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')
            AGENT_SHA=$(echo "$AGENT_STATE" | jq -r '.lastReleasedSha // ""')
            AGENT_TAG=$(echo "$AGENT_STATE" | jq -r '.lastTag // ""')
            AGENT_TS=$(echo "$AGENT_STATE" | jq -r '.updatedAt // ""')
            if [ -z "$AGENT_SHA" ]; then
              CHECKS=$(echo "$CHECKS" | jq '.agentRelease = {status:"warn", message:"Never released"}')
              [ "$WS_STATUS" = "healthy" ] && WS_STATUS="degraded"
            else
              AGE_H=-1
              if [ -n "$AGENT_TS" ] && [ "$AGENT_TS" != "null" ]; then
                LAST_S=$(date -d "$AGENT_TS" +%s 2>/dev/null || echo "$NOW_S")
                AGE_H=$(( (NOW_S - LAST_S) / 3600 ))
              fi
              CHECKS=$(echo "$CHECKS" | jq --arg tag "$AGENT_TAG" --argjson age "$AGE_H" \
                '.agentRelease = {status:"pass", message: ("Tag: " + $tag), detail: ("Age: " + ($age | tostring) + "h")}')
            fi
            # Check: stuck runs
            AGENT_SRC=$(echo "$WS_JSON" | jq -r '.agent.sourceRepo // ""')
            STUCK_COUNT=0
            if [ -n "$AGENT_SRC" ] && [ "$AGENT_SRC" != "null" ] && [ "$AGENT_SRC" != "" ]; then
              while IFS='|' read -r RID RNAME RCREATED; do
                [ -z "$RID" ] && continue
                CREATED_S=$(date -d "$RCREATED" +%s 2>/dev/null || echo "$NOW_S")
                AGE=$(( (NOW_S - CREATED_S) / 60 ))
                [ "$AGE" -gt "$STUCK_THRESHOLD_MIN" ] && STUCK_COUNT=$((STUCK_COUNT + 1))
              done < <(gh api "repos/$AGENT_SRC/actions/runs?status=in_progress&per_page=20" \
                --jq '.workflow_runs[] | "\(.id)|\(.name)|\(.created_at)"' 2>/dev/null || true)
            fi
            if [ "$STUCK_COUNT" -gt 0 ]; then
              CHECKS=$(echo "$CHECKS" | jq --argjson c "$STUCK_COUNT" '.stuckRuns = {status:"fail", message: (($c | tostring) + " stuck runs")}')
              WS_STATUS="critical"
            else
              CHECKS=$(echo "$CHECKS" | jq '.stuckRuns = {status:"pass", message:"None"}')
            fi
            # Check: expired locks
            LOCK_COUNT=0
            LOCKS=$(gh api "repos/$REPO/contents/${WS_PATH}/locks?ref=$STATE_BRANCH" \
              --jq '.[].name' 2>/dev/null || echo "")
            for LF in $LOCKS; do
              LC=$(gh api "repos/$REPO/contents/${WS_PATH}/locks/${LF}?ref=$STATE_BRANCH" \
                --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')
              LRELEASED=$(echo "$LC" | jq -r '.released // false')
              [ "$LRELEASED" = "false" ] && LOCK_COUNT=$((LOCK_COUNT + 1))
            done
            if [ "$LOCK_COUNT" -gt 0 ]; then
              CHECKS=$(echo "$CHECKS" | jq --argjson c "$LOCK_COUNT" '.locks = {status:"warn", message: (($c | tostring) + " active locks")}')
              [ "$WS_STATUS" = "healthy" ] && WS_STATUS="degraded"
            else
              CHECKS=$(echo "$CHECKS" | jq '.locks = {status:"pass", message:"No active locks"}')
            fi
            # Check: drift (agent source HEAD vs last promoted SHA)
            if [ -n "$AGENT_SRC" ] && [ "$AGENT_SRC" != "null" ] && [ "$AGENT_SRC" != "" ] && [ -n "$AGENT_SHA" ]; then
              HEAD_SHA=$(gh api "repos/$AGENT_SRC/commits/main" --jq '.sha' 2>/dev/null || echo "")
              if [ -n "$HEAD_SHA" ] && [ "$HEAD_SHA" != "$AGENT_SHA" ]; then
                AHEAD=$(gh api "repos/$AGENT_SRC/compare/${AGENT_SHA}...${HEAD_SHA}" \
                  --jq '.ahead_by' 2>/dev/null || echo "?")
                CHECKS=$(echo "$CHECKS" | jq --arg a "$AHEAD" '.drift = {status:"warn", message: ($a + " commits ahead")}')
                [ "$WS_STATUS" = "healthy" ] && WS_STATUS="degraded"
              else
                CHECKS=$(echo "$CHECKS" | jq '.drift = {status:"pass", message:"No drift"}')
              fi
            fi
            # Build health JSON
            HEALTH=$(jq -n \
              --arg ws "$WS_ID" \
              --arg now "$NOW" \
              --arg status "$WS_STATUS" \
              --argjson checks "$CHECKS" \
              '{schemaVersion:2, workspaceId:$ws, checkedAt:$now, overall:$status, checks:$checks, summary: ($status + " at " + $now)}')
            HEALTH_SHA=$(gh api "repos/$REPO/contents/${WS_PATH}/health.json?ref=$STATE_BRANCH" \
              --jq '.sha' 2>/dev/null || echo "")
            ARGS=(-f "branch=$STATE_BRANCH" -f "message=health: $WS_ID $WS_STATUS [skip ci]" -f "content=$(echo "$HEALTH" | base64 -w0)")
            [ -n "$HEALTH_SHA" ] && [ "$HEALTH_SHA" != "null" ] && ARGS+=(-f "sha=$HEALTH_SHA")
            gh api "repos/$REPO/contents/${WS_PATH}/health.json" --method PUT "${ARGS[@]}" 2>/dev/null || true
            # Append to report
            {
              echo "### Workspace: \`$WS_ID\` — $WS_STATUS"
              echo ""
              echo "| Check | Status | Message |"
              echo "|-------|--------|---------|"
              echo "$CHECKS" | jq -r 'to_entries[] | "| \(.key) | \(.value.status) | \(.value.message) |"'
              echo ""
            } >> /tmp/report.md
            [ "$WS_STATUS" = "critical" ] && OVERALL="critical"
            [ "$WS_STATUS" = "degraded" ] && [ "$OVERALL" = "healthy" ] && OVERALL="degraded"
          done
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_number }}
          path: /tmp/report.md
          retention-days: 30

      - name: Fail if critical
        if: steps.check.outputs.overall == 'critical'
        run: |
          echo "::error ::Health check critical."
          exit 1
