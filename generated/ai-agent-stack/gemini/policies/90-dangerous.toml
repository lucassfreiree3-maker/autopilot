[[rule]]
toolName = "run_shell_command"
argsPattern = "(?i)(rm\\s+-rf|del\\s+/f|format\\s+|diskpart|cipher\\s+/w|mkfs|shutdown|reboot|poweroff|passwd|net\\s+user|reg\\s+delete|bcdedit|takeown|icacls.+/grant)"
decision = "deny"
priority = 995

[[rule]]
toolName = "run_shell_command"
argsPattern = "(?i)(\\.env|id_rsa|id_ed25519|authorized_keys|known_hosts|credentials|secret|token|private[_-]?key|\\.pem|\\.pfx|\\.key)"
decision = "ask_user"
priority = 960
