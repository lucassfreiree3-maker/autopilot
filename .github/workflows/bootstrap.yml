name: "[Core] Bootstrap: Full Setup"
run-name: "${{ github.workflow }} • ${{ github.event_name }} • ws=${{ github.event.inputs.workspace_id || 'n/a' }} • ref=${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      workspace_id:
        description: "Workspace ID to bootstrap (e.g. ws-corp-1)"
        required: true
        default: "ws-default"

permissions:
  contents: write
  issues: write

concurrency:
  group: autopilot-bootstrap
  cancel-in-progress: false

env:
  REPO: lucassfreiree/autopilot
  STATE_BRANCH: autopilot-state
  BACKUP_BRANCH: autopilot-backups

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "1/8 - Validate inputs"
        id: validate_inputs
        run: |
          WS_ID="${{ github.event.inputs.workspace_id }}"
          if ! echo "$WS_ID" | grep -qE '^[a-z0-9][a-z0-9-]{1,48}[a-z0-9]$'; then
            echo "::error ::workspace_id invalido: '$WS_ID'. Use lowercase, hifens, 3-50 chars."
            exit 1
          fi
          echo "workspace_id=$WS_ID" >> "$GITHUB_OUTPUT"
          echo "Workspace ID: $WS_ID"

      - name: "2/8 - Validate secrets and vars"
        id: validate_secrets
        env:
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN != '' }}
        run: |
          ERRORS=""
          if [ "$HAS_RELEASE_TOKEN" != "true" ]; then
            ERRORS="${ERRORS}\n- Secret RELEASE_TOKEN nao configurado"
          fi
          if [ -n "$ERRORS" ]; then
            echo "::error ::Secrets/vars ausentes:$(echo -e "$ERRORS")"
            exit 1
          fi
          echo "Secrets validados."

      - name: "3/8 - Init state branch"
        id: init_state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if gh api "repos/$REPO/git/refs/heads/$STATE_BRANCH" --silent 2>/dev/null; then
            echo "Branch $STATE_BRANCH ja existe."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            BASE_SHA=$(gh api "repos/$REPO/git/refs/heads/main" --jq '.object.sha')
            gh api "repos/$REPO/git/refs" \
              --method POST \
              -f "ref=refs/heads/$STATE_BRANCH" \
              -f "sha=$BASE_SHA"
            README_B64=$(printf '# autopilot-state\n\nRuntime state branch. Do not merge into main.' | base64 -w0)
            gh api "repos/$REPO/contents/README.md" \
              --method PUT \
              -f "branch=$STATE_BRANCH" \
              -f "message=chore: init autopilot-state [skip ci]" \
              -f "content=$README_B64"
            echo "Branch $STATE_BRANCH criado."
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "4/8 - Init backup branch"
        id: init_backup
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if gh api "repos/$REPO/git/refs/heads/$BACKUP_BRANCH" --silent 2>/dev/null; then
            echo "Branch $BACKUP_BRANCH ja existe."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            BASE_SHA=$(gh api "repos/$REPO/git/refs/heads/main" --jq '.object.sha')
            gh api "repos/$REPO/git/refs" \
              --method POST \
              -f "ref=refs/heads/$BACKUP_BRANCH" \
              -f "sha=$BASE_SHA"
            README_B64=$(printf '# autopilot-backups\n\nState snapshots for rollback.' | base64 -w0)
            gh api "repos/$REPO/contents/README.md" \
              --method PUT \
              -f "branch=$BACKUP_BRANCH" \
              -f "message=chore: init autopilot-backups [skip ci]" \
              -f "content=$README_B64"
            echo "Branch $BACKUP_BRANCH criado."
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "5/8 - Seed workspace"
        id: seed_workspace
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.validate_inputs.outputs.workspace_id }}"
          WS_PATH="state/workspaces/${WS_ID}"
          EXISTING=$(gh api "repos/$REPO/contents/${WS_PATH}/workspace.json?ref=$STATE_BRANCH" \
            --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Workspace $WS_ID ja existe."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          WS_JSON=$(jq -n \
            --arg ws "$WS_ID" \
            --arg now "$NOW" \
            '{
              schemaVersion: 2,
              workspaceId: $ws,
              displayName: $ws,
              createdAt: $now,
              updatedAt: $now,
              controller: { sourceRepo: "", deployRepo: "", deployBranch: "main", deployValuesPath: "", ciWorkflowName: "", imagePattern: "" },
              agent: { sourceRepo: "", deployRepo: "", deployBranch: "main", deployValuesPath: "", capRepo: "", capBranch: "main", capValuesPath: "", ciWorkflowName: "", imagePattern: "" },
              settings: { promotionTarget: "both", autoRelease: true, lockTimeoutMinutes: 30, healthCheckEnabled: true }
            }')
          echo "$WS_JSON" | base64 -w0 > /tmp/ws.b64
          gh api "repos/$REPO/contents/${WS_PATH}/workspace.json" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=chore: seed workspace $WS_ID [skip ci]" \
            -f "content=$(cat /tmp/ws.b64)"
          for FILE in controller-release-state.json agent-release-state.json; do
            COMPONENT=$(echo "$FILE" | sed 's/-release-state.json//')
            STATE_JSON=$(jq -n \
              --arg ws "$WS_ID" \
              --arg comp "$COMPONENT" \
              --arg now "$NOW" \
              '{schemaVersion:2, workspaceId:$ws, component:$comp, lastReleasedSha:"", lastTag:"", lastVersion:"", updatedAt:$now, runId:"", runUrl:"", promotions:[], status:"idle"}')
            echo "$STATE_JSON" | base64 -w0 > /tmp/state.b64
            gh api "repos/$REPO/contents/${WS_PATH}/${FILE}" \
              --method PUT \
              -f "branch=$STATE_BRANCH" \
              -f "message=chore: seed $FILE for $WS_ID [skip ci]" \
              -f "content=$(cat /tmp/state.b64)"
          done
          HEALTH_JSON=$(jq -n \
            --arg ws "$WS_ID" \
            --arg now "$NOW" \
            '{schemaVersion:2, workspaceId:$ws, checkedAt:$now, overall:"unknown", checks:{}, summary:"Not yet checked"}')
          echo "$HEALTH_JSON" | base64 -w0 > /tmp/health.b64
          gh api "repos/$REPO/contents/${WS_PATH}/health.json" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=chore: seed health.json for $WS_ID [skip ci]" \
            -f "content=$(cat /tmp/health.b64)"
          echo "Workspace $WS_ID seeded."
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: "6/8 - Validate structure"
        id: validate_structure
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.validate_inputs.outputs.workspace_id }}"
          WS_PATH="state/workspaces/${WS_ID}"
          ERRORS=""
          for FILE in workspace.json controller-release-state.json agent-release-state.json health.json; do
            if ! gh api "repos/$REPO/contents/${WS_PATH}/${FILE}?ref=$STATE_BRANCH" --silent 2>/dev/null; then
              ERRORS="${ERRORS}\n- Arquivo ausente: ${WS_PATH}/${FILE}"
            fi
          done
          if ! gh api "repos/$REPO/git/refs/heads/$BACKUP_BRANCH" --silent 2>/dev/null; then
            ERRORS="${ERRORS}\n- Branch $BACKUP_BRANCH nao existe"
          fi
          if [ -n "$ERRORS" ]; then
            echo "::error ::Validacao falhou:$(echo -e "$ERRORS")"
            exit 1
          fi
          echo "Estrutura validada."

      - name: "7/8 - Emit report"
        id: emit_report
        if: always()
        run: |
          WS_ID="${{ steps.validate_inputs.outputs.workspace_id }}"
          {
            echo "## Bootstrap Report #${{ github.run_number }}"
            echo ""
            echo "**Workspace:** \`${WS_ID}\`"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| 1/8 - Validate inputs | ${{ steps.validate_inputs.outcome }} |"
            echo "| 2/8 - Validate secrets | ${{ steps.validate_secrets.outcome }} |"
            echo "| 3/8 - Init state branch | ${{ steps.init_state.outcome }} |"
            echo "| 4/8 - Init backup branch | ${{ steps.init_backup.outcome }} |"
            echo "| 5/8 - Seed workspace | ${{ steps.seed_workspace.outcome }} |"
            echo "| 6/8 - Validate structure | ${{ steps.validate_structure.outcome }} |"
            echo "| 7/8 - Emit report | running |"
            echo "| 8/8 - Record audit | pending |"
          } > /tmp/report.md
          cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/report.md

      - name: "7/8 - Upload report artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-report-${{ github.run_number }}
          path: /tmp/report.md
          retention-days: 90

      - name: "8/8 - Record audit"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          WS_ID="${{ steps.validate_inputs.outputs.workspace_id }}"
          WS_PATH="state/workspaces/${WS_ID}/audit"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SAFE_NOW=$(echo "$NOW" | tr ':' '-')
          AUDIT=$(jq -n \
            --arg ws "$WS_ID" \
            --arg ts "$NOW" \
            --arg run "${{ github.run_id }}" \
            --arg s1 "${{ steps.validate_inputs.outcome }}" \
            --arg s2 "${{ steps.validate_secrets.outcome }}" \
            --arg s3 "${{ steps.init_state.outcome }}" \
            --arg s4 "${{ steps.init_backup.outcome }}" \
            --arg s5 "${{ steps.seed_workspace.outcome }}" \
            --arg s6 "${{ steps.validate_structure.outcome }}" \
            '{
              operation: "bootstrap",
              workspaceId: $ws,
              timestamp: $ts,
              runId: $run,
              steps: { validateInputs: $s1, validateSecrets: $s2, initState: $s3, initBackup: $s4, seedWorkspace: $s5, validateStructure: $s6 }
            }')
          ENCODED=$(echo "$AUDIT" | base64 -w0)
          gh api "repos/$REPO/contents/${WS_PATH}/bootstrap-${SAFE_NOW}.json" \
            --method PUT \
            -f "branch=$STATE_BRANCH" \
            -f "message=audit: bootstrap $WS_ID [skip ci]" \
            -f "content=$ENCODED" 2>/dev/null || echo "Audit write failed (workspace may not exist yet)"
