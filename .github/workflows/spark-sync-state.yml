name: "[Infra] Spark Dashboard Sync"
run-name: "${{ github.workflow }} • sync state to Spark dashboard"

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_run:
    workflows:
      - "[Corp] Deploy: Apply Source Change"
      - "[Core] Auto-Merge Sweeper"
    types: [completed]
  push:
    branches: [main]
    paths:
      - 'contracts/claude-live-status.json'
      - 'contracts/copilot-session-memory.json'
      - 'contracts/codex-session-memory.json'
      - 'trigger/source-change.json'
      - 'references/spark-dashboard/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: spark-sync
  cancel-in-progress: true

jobs:
  sync:
    name: "Sync state to Spark"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Spark config
        id: config
        run: |
          SPARK_REPO=$(jq -r '.sparkApp.repo // ""' integrations/spark/config.json 2>/dev/null)
          if [ -z "$SPARK_REPO" ] || [ "$SPARK_REPO" = "" ]; then
            echo "::notice ::Spark repo not configured. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "repo=$SPARK_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect comprehensive state
        id: state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          BBVINET_TOKEN: ${{ secrets.BBVINET_TOKEN }}
        run: |
          set -euo pipefail

          # ── Release states from autopilot-state (what AUTOPILOT thinks) ──
          CTRL_STATE=$(gh api "repos/${{ github.repository }}/contents/state/workspaces/ws-default/controller-release-state.json?ref=autopilot-state" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')
          AGENT_STATE=$(gh api "repos/${{ github.repository }}/contents/state/workspaces/ws-default/agent-release-state.json?ref=autopilot-state" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')

          # ── Local files (full content for deep intelligence) ──
          TRIGGER=$(cat trigger/source-change.json 2>/dev/null || echo '{}')
          COPILOT_MEM=$(cat contracts/copilot-session-memory.json 2>/dev/null || echo '{"sessionCount":0,"lessonsLearned":[],"sessionsLog":[]}')
          CODEX_MEM=$(cat contracts/codex-session-memory.json 2>/dev/null || echo '{"sessionCount":0,"lessonsLearned":[],"sessionsLog":[]}')
          CLAUDE_STATUS=$(cat contracts/claude-live-status.json 2>/dev/null || echo '{"currentSession":{"status":"idle","task":null},"operationalState":{},"lastUpdatedBy":"unknown"}')
          CLAUDE_MEM=$(cat contracts/claude-session-memory.json 2>/dev/null || echo '{}')

          # ── Recent workflow runs (last 20 for better history) ──
          RECENT_RUNS=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=20" --jq '[.workflow_runs[:20] | .[] | {name: .name, status: .status, conclusion: .conclusion, created: .created_at, url: .html_url, run_number: .run_number, head_branch: .head_branch, event: .event}]' 2>/dev/null || echo '[]')

          # ── Open PRs ──
          OPEN_PRS=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=10" --jq '[.[] | {number: .number, title: .title, author: .user.login, branch: .head.ref, draft: .draft, created: .created_at, labels: [.labels[].name]}]' 2>/dev/null || echo '[]')

          # ── Recent deploys from audit ──
          DEPLOY_HISTORY=$(gh api "repos/${{ github.repository }}/git/trees/autopilot-state?recursive=1" --jq '[.tree[] | select(.path | test("audit/source-change")) | .path] | sort | reverse | .[:20]' 2>/dev/null || echo '[]')

          # ── Session lock status ──
          SESSION_LOCK=$(gh api "repos/${{ github.repository }}/contents/state/workspaces/ws-default/locks/session-lock.json?ref=autopilot-state" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{"agentId":"none"}')

          # ── Health state ──
          HEALTH=$(gh api "repos/${{ github.repository }}/contents/state/workspaces/ws-default/health.json?ref=autopilot-state" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')

          # ── CI Monitor state ──
          CI_MONITOR=$(gh api "repos/${{ github.repository }}/contents/state/workspaces/ws-default/ci-monitor-controller.json?ref=autopilot-state" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo '{}')

          # ══════════════════════════════════════════════════════════
          # ── REAL CORPORATE VERSIONS (source of truth from repos) ──
          # Other people can deploy independently without autopilot.
          # We MUST read the real versions from the actual repos.
          # ══════════════════════════════════════════════════════════

          # Controller package.json → real source version
          CTRL_REAL_VER="?"
          if [ -n "$BBVINET_TOKEN" ]; then
            CTRL_REAL_VER=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-controller/contents/package.json" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.version // "?"' 2>/dev/null || echo "?")
          fi

          # Agent package.json → real source version
          AGENT_REAL_VER="?"
          if [ -n "$BBVINET_TOKEN" ]; then
            AGENT_REAL_VER=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-agent/contents/package.json" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | jq -r '.version // "?"' 2>/dev/null || echo "?")
          fi

          # Controller CAP values.yaml → real deployed image tag
          CTRL_CAP_TAG="?"
          if [ -n "$BBVINET_TOKEN" ]; then
            CTRL_CAP_RAW=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc_releases_cap_sre-aut-controller/contents/releases/openshift/hml/deploy/values.yaml" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -n "$CTRL_CAP_RAW" ]; then
              CTRL_CAP_TAG=$(echo "$CTRL_CAP_RAW" | grep -oP 'psc-sre-automacao-controller:\K[0-9]+\.[0-9]+\.[0-9]+' 2>/dev/null || echo "?")
            fi
          fi

          # Agent CAP values.yaml → real deployed image tag
          AGENT_CAP_TAG="?"
          if [ -n "$BBVINET_TOKEN" ]; then
            AGENT_CAP_RAW=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc_releases_cap_sre-aut-agent/contents/releases/openshift/hml/deploy/values.yaml" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            if [ -n "$AGENT_CAP_RAW" ]; then
              AGENT_CAP_TAG=$(echo "$AGENT_CAP_RAW" | grep -oP 'psc-sre-automacao-agent:\K[0-9]+\.[0-9]+\.[0-9]+' 2>/dev/null || echo "?")
            fi
          fi

          # Controller latest commits (detect external changes)
          CTRL_LATEST_COMMITS=$(GH_TOKEN="${BBVINET_TOKEN:-$GH_TOKEN}" gh api "repos/bbvinet/psc-sre-automacao-controller/commits?per_page=5" --jq '[.[:5] | .[] | {sha: .sha[:8], message: .commit.message[:80], author: .commit.author.name, date: .commit.author.date}]' 2>/dev/null || echo '[]')

          # Agent latest commits
          AGENT_LATEST_COMMITS=$(GH_TOKEN="${BBVINET_TOKEN:-$GH_TOKEN}" gh api "repos/bbvinet/psc-sre-automacao-agent/commits?per_page=5" --jq '[.[:5] | .[] | {sha: .sha[:8], message: .commit.message[:80], author: .commit.author.name, date: .commit.author.date}]' 2>/dev/null || echo '[]')

          # ══════════════════════════════════════════════════════════
          # ── BUILD STATUS per commit (correlate builds with SHAs) ──
          # ══════════════════════════════════════════════════════════
          CTRL_BUILDS="[]"
          if [ -n "$BBVINET_TOKEN" ]; then
            # Get check-runs for last 3 commits on controller
            for SHA in $(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-controller/commits?per_page=3" --jq '.[].sha' 2>/dev/null); do
              BUILD=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-controller/commits/$SHA/check-runs" --jq '{sha: "'${SHA:0:8}'", total: .total_count, checks: [.check_runs[:5][] | {name: .name, status: .status, conclusion: .conclusion}]}' 2>/dev/null || echo '{}')
              if [ -n "$BUILD" ] && [ "$BUILD" != "{}" ]; then
                CTRL_BUILDS=$(echo "$CTRL_BUILDS" | jq --argjson b "$BUILD" '. + [$b]')
              fi
            done
          fi

          AGENT_BUILDS="[]"
          if [ -n "$BBVINET_TOKEN" ]; then
            for SHA in $(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-agent/commits?per_page=3" --jq '.[].sha' 2>/dev/null); do
              BUILD=$(GH_TOKEN="$BBVINET_TOKEN" gh api "repos/bbvinet/psc-sre-automacao-agent/commits/$SHA/check-runs" --jq '{sha: "'${SHA:0:8}'", total: .total_count, checks: [.check_runs[:5][] | {name: .name, status: .status, conclusion: .conclusion}]}' 2>/dev/null || echo '{}')
              if [ -n "$BUILD" ] && [ "$BUILD" != "{}" ]; then
                AGENT_BUILDS=$(echo "$AGENT_BUILDS" | jq --argjson b "$BUILD" '. + [$b]')
              fi
            done
          fi

          echo "::notice ::Real versions — Controller: $CTRL_REAL_VER (CAP: $CTRL_CAP_TAG), Agent: $AGENT_REAL_VER (CAP: $AGENT_CAP_TAG)"

          # ── Build comprehensive state.json with FULL intelligence ──
          jq -n \
            --argjson ctrl "$CTRL_STATE" \
            --argjson agent "$AGENT_STATE" \
            --argjson trigger "$TRIGGER" \
            --argjson copilot "$COPILOT_MEM" \
            --argjson codex "$CODEX_MEM" \
            --argjson claude "$CLAUDE_STATUS" \
            --argjson claude_mem "$CLAUDE_MEM" \
            --argjson runs "$RECENT_RUNS" \
            --argjson prs "$OPEN_PRS" \
            --argjson deploys "$DEPLOY_HISTORY" \
            --argjson lock "$SESSION_LOCK" \
            --argjson health "$HEALTH" \
            --argjson ci_monitor "$CI_MONITOR" \
            --arg ctrl_real "$CTRL_REAL_VER" \
            --arg agent_real "$AGENT_REAL_VER" \
            --arg ctrl_cap "$CTRL_CAP_TAG" \
            --arg agent_cap "$AGENT_CAP_TAG" \
            --argjson ctrl_commits "$CTRL_LATEST_COMMITS" \
            --argjson agent_commits "$AGENT_LATEST_COMMITS" \
            --argjson ctrl_builds "$CTRL_BUILDS" \
            --argjson agent_builds "$AGENT_BUILDS" \
            '{
              lastSync: now | strftime("%Y-%m-%dT%H:%M:%SZ"),
              syncSource: "autopilot/spark-sync-state.yml",

              controller: {
                version: ($ctrl.lastTag // $trigger.version // "?"),
                status: ($ctrl.status // "unknown"),
                ciResult: ($ctrl.ciResult // "unknown"),
                promoted: ($ctrl.promoted // false),
                lastSha: ($ctrl.lastReleasedSha // "?"),
                updatedAt: ($ctrl.updatedAt // null),
                repo: "bbvinet/psc-sre-automacao-controller",
                capRepo: "bbvinet/psc_releases_cap_sre-aut-controller",
                stack: "Node 22, TypeScript, Express, Jest, SQLite, S3"
              },

              agent: {
                version: ($agent.lastTag // "?"),
                status: ($agent.status // "unknown"),
                ciResult: ($agent.ciResult // "unknown"),
                promoted: ($agent.promoted // false),
                lastSha: ($agent.lastReleasedSha // "?"),
                updatedAt: ($agent.updatedAt // null),
                repo: "bbvinet/psc-sre-automacao-agent",
                capRepo: "bbvinet/psc_releases_cap_sre-aut-agent",
                stack: "Node 22, TypeScript, Express, Jest, K8s client"
              },

              pipeline: {
                status: ($copilot.currentState.pipelineStatus // "idle"),
                lastRun: ($trigger.run // 0),
                component: ($trigger.component // "?"),
                version: ($trigger.version // "?"),
                promote: ($trigger.promote // false),
                workspace: ($trigger._context // "?"),
                changeType: ($trigger.change_type // "?"),
                commitMessage: ($trigger.commit_message // "?"),
                changesCount: ($trigger.changes | length // 0)
              },

              agents: {
                claude: {
                  status: ($claude.currentSession.status // "idle"),
                  task: ($claude.currentSession.task // null),
                  phase: ($claude.currentSession.phase // null),
                  lastUpdated: ($claude.lastUpdated // null),
                  lastAction: ($claude.lastCompletedAction.action // null)
                },
                copilot: {
                  sessionCount: ($copilot.sessionCount // 0),
                  lastSession: ($copilot.sessionsLog[-1].summary // "none"),
                  lessonsCount: ($copilot.lessonsLearned | length),
                  lastUpdated: ($copilot.lastUpdated // null),
                  sessions: [($copilot.sessionsLog // [])[] | {date, summary, actions: (.actions | length)}] | .[-5:]
                },
                codex: {
                  sessionCount: ($codex.sessionCount // 0),
                  lastSession: ($codex.sessionsLog[-1].summary // "none"),
                  lessonsCount: ($codex.lessonsLearned | length),
                  lastUpdated: ($codex.lastUpdated // null),
                  sessions: [($codex.sessionsLog // [])[] | {date, summary, actions: (.actions | length)}] | .[-5:]
                }
              },

              sessionLock: {
                agentId: ($lock.agentId // "none"),
                expiresAt: ($lock.expiresAt // null),
                acquiredAt: ($lock.acquiredAt // null),
                operation: ($lock.operation // null)
              },

              health: $health,
              ciMonitor: $ci_monitor,

              workspaces: [
                {
                  id: "ws-default",
                  company: "Getronics",
                  status: "active",
                  stack: "Node/TypeScript (NestJS, Jest, ESLint)",
                  token: "BBVINET_TOKEN",
                  controllerVersion: ($ctrl.lastTag // $trigger.version // "?"),
                  agentVersion: ($agent.lastTag // "?"),
                  pipelineStatus: ($copilot.currentState.pipelineStatus // "idle"),
                  repos: ["psc-sre-automacao-controller", "psc-sre-automacao-agent", "psc_releases_cap_sre-aut-controller", "psc_releases_cap_sre-aut-agent"]
                },
                {
                  id: "ws-cit",
                  company: "CIT",
                  status: "setup",
                  stack: "DevOps (K8s, Docker, Terraform, Helm, ArgoCD)",
                  token: "CIT_TOKEN",
                  controllerVersion: null,
                  agentVersion: null,
                  pipelineStatus: "not-configured",
                  repos: []
                },
                {
                  id: "ws-socnew",
                  company: "SocNew (terceiro)",
                  status: "locked",
                  stack: null,
                  token: null,
                  controllerVersion: null,
                  agentVersion: null,
                  pipelineStatus: "locked",
                  repos: []
                },
                {
                  id: "ws-corp-1",
                  company: "Corp-1 (terceiro)",
                  status: "locked",
                  stack: null,
                  token: null,
                  controllerVersion: null,
                  agentVersion: null,
                  pipelineStatus: "locked",
                  repos: []
                }
              ],

              recentWorkflows: $runs,
              openPRs: $prs,
              deployHistory: $deploys,

              lessonsLearned: {
                total: (($copilot.lessonsLearned | length) + ($codex.lessonsLearned | length)),
                copilot: ($copilot.lessonsLearned | length),
                codex: ($codex.lessonsLearned | length),
                copilotLessons: [($copilot.lessonsLearned // [])[] | {lesson, fix, source}] | .[-30:],
                codexLessons: [($codex.lessonsLearned // [])[] | {lesson, fix, source}] | .[-30:]
              },

              versionRules: {
                currentController: ($claude_mem.versioningRules.currentVersion // $ctrl.lastTag // "?"),
                currentAgent: ($claude_mem.currentState.agentVersion // $agent.lastTag // "?"),
                pattern: "After X.Y.9 next is X.(Y+1).0 — NEVER X.Y.10",
                lastTriggerRun: ($claude_mem.deployFlow.lastTriggerRun // $trigger.run // 0),
                lastSuccessfulRun: ($claude_mem.deployFlow.lastSuccessfulRun // 0)
              },

              executionHistory: ($claude_mem.executionHistory.sessions // []) | [.[] | {id, date, summary}] | .[-10:],

              knownErrors: [
                {code: "403_push", desc: "Branch nao comeca com claude/copilot/codex/", fix: "Renomear branch"},
                {code: "trigger_not_firing", desc: "Campo run nao incrementado", fix: "Incrementar run +1"},
                {code: "duplicate_tag", desc: "Versao ja existe no registry", fix: "Incrementar patch"},
                {code: "eslint_no_use_before_define", desc: "Funcao usada antes de definir", fix: "Mover funcao para cima"},
                {code: "eslint_no_nested_ternary", desc: "Ternario aninhado", fix: "Usar if/else"},
                {code: "ts2769_jwt_sign", desc: "expiresIn tipo errado", fix: "parseExpiresIn() com cast"},
                {code: "swagger_garbled", desc: "Acentos no swagger", fix: "ASCII puro"},
                {code: "jwt_scope_plural", desc: "scopes (plural) no JWT", fix: "Usar scope (singular)"},
                {code: "search_replace_newlines", desc: "sed nao interpreta newlines", fix: "Usar replace-file"},
                {code: "ci_gate_broken", desc: "CI Gate pre-existing detection falso", fix: "Ler ci-logs-*.txt"},
                {code: "mock_tests_broken", desc: "validateTrustedUrl em fetch/postJson", fix: "Remover do fetch"},
                {code: "pr_dirty", desc: "Conflito com main", fix: "git pull --rebase origin main"}
              ],

              pipelineStages: [
                {name: "Setup", desc: "Read workspace config, resolve inputs"},
                {name: "Session Guard", desc: "Acquire multi-agent lock"},
                {name: "Apply & Push", desc: "Clone repo, apply patches, push"},
                {name: "CI Gate", desc: "Wait corporate CI (Esteira Build NPM)"},
                {name: "Promote", desc: "Update CAP values.yaml image tag"},
                {name: "Save State", desc: "Record on autopilot-state"},
                {name: "Audit", desc: "Audit trail + release lock"}
              ],

              corporateReal: {
                description: "REAL versions from corporate repos — source of truth. Other people may deploy independently.",
                controller: {
                  sourceVersion: $ctrl_real,
                  capTag: $ctrl_cap,
                  recentCommits: $ctrl_commits,
                  builds: $ctrl_builds,
                  drift: (if $ctrl_real != "?" and ($ctrl.lastTag // "?") != "?" and $ctrl_real != ($ctrl.lastTag // "?") then true else false end),
                  driftDetail: (if $ctrl_real != "?" and ($ctrl.lastTag // "?") != "?" and $ctrl_real != ($ctrl.lastTag // "?") then ("autopilot=" + ($ctrl.lastTag // "?") + " real=" + $ctrl_real) else null end)
                },
                agent: {
                  sourceVersion: $agent_real,
                  capTag: $agent_cap,
                  recentCommits: $agent_commits,
                  builds: $agent_builds,
                  drift: (if $agent_real != "?" and ($agent.lastTag // "?") != "?" and $agent_real != ($agent.lastTag // "?") then true else false end),
                  driftDetail: (if $agent_real != "?" and ($agent.lastTag // "?") != "?" and $agent_real != ($agent.lastTag // "?") then ("autopilot=" + ($agent.lastTag // "?") + " real=" + $agent_real) else null end)
                },
                lastChecked: now | strftime("%Y-%m-%dT%H:%M:%SZ")
              },

              metadata: {
                autopilotRepo: "lucassfreiree/autopilot",
                sparkRepo: "lucassfreiree/spark-dashboard",
                totalAgents: 3,
                totalWorkspaces: 4,
                syncInterval: "5 minutes",
                stateVersion: 3
              }
            }' > /tmp/state.json

          cat /tmp/state.json | jq '.lastSync'
          echo "state_b64=$(base64 -w0 /tmp/state.json)" >> "$GITHUB_OUTPUT"

      - name: Push state to Spark repo
        if: steps.config.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SPARK_REPO="${{ steps.config.outputs.repo }}"
          STATE_B64="${{ steps.state.outputs.state_b64 }}"

          EXISTING_SHA=$(gh api "repos/$SPARK_REPO/contents/public/state.json" --jq '.sha' 2>/dev/null || echo "")

          PAYLOAD=$(jq -n \
            --arg content "$STATE_B64" \
            --arg sha "$EXISTING_SHA" \
            --arg message "chore: sync autopilot state [automated]" \
            '{message: $message, content: $content} + (if $sha != "" then {sha: $sha} else {} end)')

          if gh api "repos/$SPARK_REPO/contents/public/state.json" \
            --method PUT \
            --input - <<< "$PAYLOAD" > /dev/null 2>&1; then
            echo "::notice ::State synced to $SPARK_REPO"
          else
            echo "::warning ::Failed to push state to $SPARK_REPO"
          fi

      - name: Push dashboard HTML to Spark repo
        if: steps.config.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          SPARK_REPO="${{ steps.config.outputs.repo }}"
          HTML_FILE="references/spark-dashboard/public/index.html"

          if [ ! -f "$HTML_FILE" ]; then
            echo "::notice ::Dashboard HTML not found at $HTML_FILE — skipping"
            exit 0
          fi

          HTML_B64=$(base64 < "$HTML_FILE" | tr -d '\n')
          EXISTING_SHA=$(gh api "repos/$SPARK_REPO/contents/public/index.html" --jq '.sha' 2>/dev/null || echo "")

          PAYLOAD=$(jq -n \
            --arg content "$HTML_B64" \
            --arg sha "$EXISTING_SHA" \
            --arg message "chore: sync dashboard UI [automated]" \
            '{message: $message, content: $content} + (if $sha != "" then {sha: $sha} else {} end)')

          if gh api "repos/$SPARK_REPO/contents/public/index.html" \
            --method PUT \
            --input - <<< "$PAYLOAD" 2>&1; then
            echo "::notice ::Dashboard HTML synced to $SPARK_REPO"
          else
            echo "::warning ::Failed to push dashboard HTML to $SPARK_REPO (repo may not exist yet)"
          fi

      - name: Update panel/dashboard/state.json (GitHub Pages)
        if: always() && steps.state.outputs.state_b64 != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          STATE_B64="${{ steps.state.outputs.state_b64 }}"

          EXISTING_SHA=$(gh api "repos/${{ github.repository }}/contents/panel/dashboard/state.json" --jq '.sha' 2>/dev/null || echo "")

          PAYLOAD=$(jq -n \
            --arg content "$STATE_B64" \
            --arg sha "$EXISTING_SHA" \
            --arg message "chore: sync dashboard state.json [auto]" \
            '{message: $message, content: $content} + (if $sha != "" then {sha: $sha} else {} end)')

          if gh api "repos/${{ github.repository }}/contents/panel/dashboard/state.json" \
            --method PUT \
            --input - <<< "$PAYLOAD" > /dev/null 2>&1; then
            echo "::notice ::State synced to panel/dashboard/state.json"
          else
            echo "::warning ::Failed to update panel/dashboard/state.json"
          fi
