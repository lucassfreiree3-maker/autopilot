version: "3"
services:
  app:
    container_name: psc-sre-automacao-agent
    image: psc-sre-automacao-agent
    build:
      context: ../
      dockerfile: Dockerfile
    user: "${MY_UID}:${MY_GID}"
    command: npm run dev
    network_mode: host
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ../:/app
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: localhost
      APP_HOST: 0.0.0.0
      API_PORT: 3000
      ENABLE_LOG_HTTP: 1
    healthcheck:
      test: curl -f --noproxy 'localhost' http://localhost:3000/health
      interval: 20s
      timeout: 5s
      retries: 5


